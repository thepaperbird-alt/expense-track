<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Daily</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-row">
          <div class="brand-lockup">
            <span class="brand-mark">Money Daily</span>
          </div>
          <div class="month-row">
            <button type="button" id="prev-month" class="month-nav month-nav-arrow" aria-label="Previous month">
              &#8249;
            </button>
            <h1 id="month-label">March 2026</h1>
            <button type="button" id="next-month" class="month-nav month-nav-arrow" aria-label="Next month">
              &#8250;
            </button>
          </div>
        </div>
        <div class="topbar-actions">
          <button type="button" id="zoom-in" class="topbar-icon" aria-label="Zoom in">+</button>
          <button type="button" id="zoom-out" class="topbar-icon" aria-label="Zoom out">-</button>
          <button type="button" id="zoom-reset" class="topbar-icon topbar-reset" aria-label="Reset zoom">100%</button>
          <div class="avatar-dot">M</div>
        </div>
      </header>

      <main class="workspace">
        <section class="canvas-shell">
          <section class="canvas" id="canvas">
            <div class="canvas-world" id="canvas-world">
              <svg class="connections" id="connections"></svg>
            </div>
          </section>
          <div class="canvas-tools" aria-hidden="true">
            <button type="button" class="canvas-tool" id="toolbar-income" aria-label="Create income node">$+</button>
            <button type="button" class="canvas-tool" id="toolbar-expense" aria-label="Create expense node">$-</button>
            <button type="button" class="canvas-tool" id="download-statement" aria-label="Download statement">↓</button>
          </div>
        </section>
      </main>
    </div>

    <div class="popup" id="node-popup" hidden>
      <form class="popup-card" id="popup-form">
        <h2>Create Node</h2>
        <label>
          <span class="field-label">Type</span>
          <input id="popup-type-label" type="text" readonly />
        </label>
        <label>
          <span class="field-label">What for?</span>
          <input id="popup-purpose" type="text" maxlength="40" placeholder="Rent, EMI, salary..." required />
        </label>
        <label>
          <span class="field-label">Amount (INR)</span>
          <input id="popup-amount" type="number" min="0" step="0.01" value="0" required />
        </label>
        <div class="popup-actions">
          <button type="button" id="popup-cancel" class="ghost-button">Cancel</button>
          <button type="submit">Create</button>
        </div>
      </form>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
